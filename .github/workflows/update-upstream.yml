name: Update upstream package

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v31

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Update flake inputs
        run: nix flake update nixpkgs upstream

      - name: Sync package metadata from upstream
        run: |
          upstream_path="$(nix eval --raw --impure --expr '(builtins.getFlake (toString ./.)).inputs.upstream.outPath')"
          cp "$upstream_path/package.json" package.json

      - name: Regenerate npm lockfile
        run: npm install --package-lock-only --ignore-scripts

      - name: Build plugin package
        run: nix build .#openclawPlugin

      - name: Check OpenClaw plugin output
        run: |
          test "$(nix eval --raw --impure --expr '((builtins.getFlake (toString ./.)).openclawPlugin "x86_64-linux").name')" = "openclaw-weixin"
          nix eval --json --impure --expr '((builtins.getFlake (toString ./.)).openclawPlugin "x86_64-linux").needs'

      - name: Create pull request
        uses: peter-evans/create-pull-request@v7
        with:
          branch: update-upstream-package
          commit-message: "Update upstream package"
          title: "Update upstream package"
          body: "Automated update of the upstream OpenClaw Weixin source, npm lockfile, and Nix lockfile."
