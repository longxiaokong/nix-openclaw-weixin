name: Update upstream package

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: cachix/install-nix-action@v31

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Update flake inputs
        run: nix flake update nixpkgs upstream

      - name: Regenerate npm lockfile
        run: |
          upstream_path="$(nix eval --raw --impure --expr '(builtins.getFlake (toString ./.)).inputs.upstream.outPath')"
          workdir="$(mktemp -d)"
          cp "$upstream_path/package.json" "$workdir/package.json"
          cd "$workdir"
          npm install --package-lock-only --ignore-scripts
          cp package-lock.json "$GITHUB_WORKSPACE/package-lock.json"

      - name: Build plugin package
        run: nix build .#default

      - name: Check OpenClaw plugin output
        run: |
          test "$(nix eval --raw --impure --expr '((builtins.getFlake (toString ./.)).openclawPlugin "x86_64-linux").name')" = "openclaw-weixin"
          test "$(nix eval --json --impure --expr '((builtins.getFlake (toString ./.)).openclawPlugin "x86_64-linux").needs')" = '{"requiredEnv":[],"stateDirs":[".openclaw",".openclaw/credentials"]}'
          test "$(nix eval --json --impure --expr 'builtins.attrNames (builtins.getFlake (toString ./.)).homeManagerModules')" = '["default"]'

      - name: Check nix-openclaw plugin contract
        run: |
          test "$(nix eval --json --impure --expr 'builtins.isFunction (builtins.getFlake (toString ./.)).openclawPlugin')" = "true"
          test "$(nix eval --json --impure --expr 'builtins.length ((builtins.getFlake (toString ./.)).openclawPlugin "x86_64-linux").skills')" = "1"
          test "$(nix eval --json --impure --expr 'builtins.length ((builtins.getFlake (toString ./.)).openclawPlugin "x86_64-linux").packages')" = "1"
          test "$(nix eval --json --impure --expr 'builtins.length ((builtins.getFlake (toString ./.)).openclawPlugin "x86_64-linux").plugins')" = "1"
          test "$(nix eval --raw --impure --expr '(builtins.elemAt ((builtins.getFlake (toString ./.)).openclawPlugin "x86_64-linux").plugins 0).id')" = "openclaw-weixin"
          plugin_path="$(nix eval --raw --impure --expr '(builtins.elemAt ((builtins.getFlake (toString ./.)).openclawPlugin "x86_64-linux").plugins 0).path')"
          case "$plugin_path" in
            */lib/openclaw/plugins/openclaw-weixin) ;;
            *) echo "unexpected openclawPlugin.plugins path: $plugin_path" >&2; exit 1 ;;
          esac
          test "$(nix eval --json --impure --expr '((builtins.getFlake (toString ./.)).openclawPlugin "x86_64-linux").needs ? stateDirs')" = "true"
          test "$(nix eval --json --impure --expr '((builtins.getFlake (toString ./.)).openclawPlugin "x86_64-linux").needs ? requiredEnv')" = "true"

          load_path="$(nix eval --raw --impure --expr 'let f = builtins.getFlake (toString ./.); pkgs = import f.inputs.nixpkgs { system = builtins.currentSystem; }; in builtins.elemAt (f.homeManagerModules.default { lib = pkgs.lib; inherit pkgs; }).programs.openclaw.config.plugins.load.paths 0')"
          case "$load_path" in
            */lib/openclaw/plugins/openclaw-weixin) ;;
            *) echo "unexpected plugin load path: $load_path" >&2; exit 1 ;;
          esac
          test "$(nix eval --json --impure --expr 'let f = builtins.getFlake (toString ./.); pkgs = import f.inputs.nixpkgs { system = builtins.currentSystem; }; in (f.homeManagerModules.default { lib = pkgs.lib; inherit pkgs; }).programs.openclaw.config.plugins.entries.openclaw-weixin.enabled._type')" = '"override"'

      - name: Check plugin manifest metadata
        run: |
          node --input-type=module <<'EOF'
          import { readFileSync } from "node:fs";
          import { resolve } from "node:path";

          const manifestPath = resolve("result/lib/openclaw/plugins/openclaw-weixin/openclaw.plugin.json");
          const manifest = JSON.parse(readFileSync(manifestPath, "utf8"));
          if (!manifest.channels?.includes("openclaw-weixin")) {
            throw new Error("manifest must declare the openclaw-weixin channel");
          }
          if (!manifest.channelConfigs?.["openclaw-weixin"]?.schema) {
            throw new Error("manifest must include channelConfigs.openclaw-weixin.schema");
          }
          EOF

      - name: Check runtime npm dependencies
        run: |
          node --input-type=module <<'EOF'
          import { createRequire } from "node:module";
          import { readFileSync } from "node:fs";
          import { resolve } from "node:path";

          const pluginDir = resolve("result/lib/openclaw/plugins/openclaw-weixin");
          const packageJson = JSON.parse(readFileSync(resolve(pluginDir, "package.json"), "utf8"));
          const requireFromPlugin = createRequire(resolve(pluginDir, "dist/index.js"));
          const modules = [
            ...Object.keys(packageJson.dependencies ?? {}),
            "silk-wasm",
          ];

          for (const moduleName of modules) {
            requireFromPlugin.resolve(moduleName);
          }
          EOF

      - name: Create pull request
        uses: peter-evans/create-pull-request@v8
        with:
          branch: update-upstream-package
          commit-message: "Update upstream package"
          title: "Update upstream package"
          body: "Automated update of the upstream OpenClaw Weixin source, npm lockfile, and Nix lockfile."
