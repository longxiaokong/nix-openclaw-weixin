name: Update upstream package

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v31

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Update flake inputs
        run: nix flake update nixpkgs upstream

      - name: Regenerate npm lockfile
        run: |
          upstream_path="$(nix eval --raw --impure --expr '(builtins.getFlake (toString ./.)).inputs.upstream.outPath')"
          workdir="$(mktemp -d)"
          cp "$upstream_path/package.json" "$workdir/package.json"
          cd "$workdir"
          npm install --package-lock-only --ignore-scripts
          cp package-lock.json "$GITHUB_WORKSPACE/package-lock.json"

      - name: Build plugin package
        run: nix build .#default

      - name: Check OpenClaw plugin output
        run: |
          test "$(nix eval --raw --impure --expr '((builtins.getFlake (toString ./.)).openclawPlugin "x86_64-linux").name')" = "openclaw-weixin"
          test "$(nix eval --json --impure --expr '((builtins.getFlake (toString ./.)).openclawPlugin "x86_64-linux").needs')" = '{"requiredEnv":[],"stateDirs":[".openclaw",".openclaw/credentials"]}'
          test "$(nix eval --json --impure --expr 'builtins.attrNames (builtins.getFlake (toString ./.)).homeManagerModules')" = '["default"]'

      - name: Check runtime npm dependencies
        run: |
          node --input-type=module <<'EOF'
          import { createRequire } from "node:module";
          import { readFileSync } from "node:fs";
          import { resolve } from "node:path";

          const pluginDir = resolve("result/lib/openclaw/plugins/openclaw-weixin");
          const packageJson = JSON.parse(readFileSync(resolve(pluginDir, "package.json"), "utf8"));
          const requireFromPlugin = createRequire(resolve(pluginDir, "dist/index.js"));
          const modules = [
            ...Object.keys(packageJson.dependencies ?? {}),
            "silk-wasm",
          ];

          for (const moduleName of modules) {
            requireFromPlugin.resolve(moduleName);
          }
          EOF

      - name: Create pull request
        uses: peter-evans/create-pull-request@v7
        with:
          branch: update-upstream-package
          commit-message: "Update upstream package"
          title: "Update upstream package"
          body: "Automated update of the upstream OpenClaw Weixin source, npm lockfile, and Nix lockfile."
